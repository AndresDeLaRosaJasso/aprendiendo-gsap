<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="src/global.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>aprendiendo-gsap</title>
  </head>
  <body>

    <div class="hotbar">
      <div class="logo hotbar-item"><img id="logo-gsap" src="/src/assets/gsal-logo.png" alt=""></div>
      <div class="menu hotbar-item"><svg id="svg-menu" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><g id="svg-menu" stroke-width="0"></g><g id="svg-menu" stroke-linecap="round" stroke-linejoin="round"></g><g id="svg-menu"> <g id="svg-menu"> <path id="svg-menu" d="M3 15H21M3 9H21" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> </g> </g></svg></div>
    </div>

    <section class="section hero">
      <div class="grid">
        <div style="grid-area: b1;" class="grid-item"></div>
        <div style="grid-area: b2;" class="grid-item"></div>
        <div style="grid-area: b3;" class="grid-item"></div>
        <div style="grid-area: b4;" class="grid-item"></div>
        <div style="grid-area: b5;" class="grid-item">
          <div class="staggerContainer">
            <!-- TODO animaciones de cajas con stagger -->
          </div>
        </div>
        <div style="grid-area: b6;" class="grid-item"><img id="ojo-gojo" src="/src/assets/ojo-gojo.png" alt=""></div>
      </div>
    </section>

    <section class="section carousel">
      <div class="containerCarousel">
        <div class="carousel-item"><img src="/src/assets/uncharted3.png" alt=""></div>
        <div class="carousel-item"><img src="/src/assets/batman.png" alt=""></div>
        <div class="carousel-item"><img src="/src/assets/god-of-war.webp" alt=""></div>
        <div class="carousel-item"><img src="/src/assets/gta6.png" alt=""></div>
        <div class="carousel-item"><img src="/src/assets/horizon.webp" alt=""></div>
        <div class="carousel-item"><img src="/src/assets/tlou1.png" alt=""></div>
        <div class="carousel-item"><img src="/src/assets/tlou2.png" alt=""></div>
        <div class="carousel-item"><img src="/src/assets/Res4.webp" alt=""></div>
        <div class="carousel-item"><img src="/src/assets/cyberpunk.webp" alt=""></div>
        <div class="carousel-item"><video autoplay loop muted src="/src/assets/shadow.webm" alt=""></div>
      </div>
      <div class="titulosFavoritos">
        <h1 id="my" class="h1 orbitron-titles">MY</h1>
        <h1 id="favorite" class="h1 orbitron-titles">FAVORITE</h1>
        <h1 id="videogames" class="h1 orbitron-titles">GAMES</h1>
      </div>
    </section>

    <section class="section gojo">

    </section>
   

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
